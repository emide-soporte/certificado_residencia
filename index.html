<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Certificado de Residencia - Junta de Vecinos N°7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <!-- CONTENEDOR DE ESTILOS DINÁMICOS -->
    <style id="dynamic-style-injector">
        :root {
            --label-font: 'Times New Roman', Times, serif;
            --body-font: 'Times New Roman', Times, serif;
            --font-scale: 1;
            --cert-line-height: 1.5;
        }
    </style>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        
        /* Aplicación global de variables */
        .font-cert-title { font-family: var(--label-font) !important; font-size: calc(22px * var(--font-scale)) !important; line-height: 1.2 !important; }
        .font-cert-body { font-family: var(--body-font) !important; font-size: calc(11.5px * var(--font-scale)) !important; line-height: var(--cert-line-height) !important; }

        #preview-container { background-color: #1e293b; display: flex; justify-content: center; align-items: flex-start; padding: 2rem; overflow-x: auto; min-height: 100vh; }
        .a4-sheet { width: 210mm; height: 297mm; min-width: 210mm; min-height: 297mm; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        .half-sheet { height: 148.5mm; max-height: 148.5mm; width: 210mm; padding: 8mm 16mm 8mm 16mm; box-sizing: border-box; position: relative; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; color: #000000; }
        .address-text-flow { font-weight: bold !important; text-decoration: underline !important; text-underline-offset: 4px !important; text-decoration-color: #000000 !important; text-decoration-thickness: 1.2px !important; padding: 0 4px; display: inline; word-wrap: break-word; }
        .cut-line { position: absolute; top: 148.5mm; left: 0; width: 100%; border-top: 1.5px dashed #cbd5e1; z-index: 50; }
        .cut-indicator { position: absolute; top: 148.5mm; left: 50%; transform: translate(-50%, -50%); background: #ffffff; padding: 2px 10px; border: 1px solid #e2e8f0; border-radius: 9999px; color: #475569; font-size: 10px; z-index: 51; }

        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            #preview-container { padding: 0 !important; }
            .a4-sheet { box-shadow: none !important; margin: 0 !important; }
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- PANEL DE CONTROL -->
    <div class="no-print w-full md:w-[440px] bg-slate-900 text-slate-100 flex flex-col h-full border-r border-slate-800 z-50">
        <div class="p-5 border-b border-slate-800 bg-slate-950">
            <h1 class="font-bold text-lg text-white">Editor Certificado Residencia</h1>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            
            <!-- Sincronización -->
            <div class="bg-emerald-950/30 p-3 rounded-xl border border-emerald-500/30 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-emerald-400">Sincronización Automática</p>
                    <p class="text-[10px] text-emerald-600/80">Mantener certificados idénticos</p>
                </div>
                <input type="checkbox" id="sync-checkbox" class="h-5 w-5 rounded bg-slate-950 border-emerald-800" checked onchange="toggleSync()">
            </div>

            <!-- Ajustes Tipografía -->
            <div class="bg-slate-800/40 p-4 rounded-xl border border-slate-800/80 space-y-4">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-300">Ajustes Visuales</span>
                <select id="select-label-font" onchange="actualizarEstiloFuente()" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs">
                    <option value="'Times New Roman', Times, serif">Times New Roman</option>
                    <option value="'Arial', sans-serif">Arial</option>
                </select>
                <div class="space-y-1">
                    <div class="flex justify-between text-xs text-slate-300"><span>Tamaño Base:</span><span id="font-size-value">100</span>%</div>
                    <input type="range" id="input-font-size" min="80" max="150" value="100" class="w-full" oninput="actualizarEstiloFuente()">
                </div>
            </div>

            <!-- FORMULARIOS -->
            <div class="space-y-4">
                <div class="bg-slate-800/30 p-4 rounded-xl border border-emerald-500/20 space-y-3">
                    <h3 class="text-xs font-bold text-emerald-400 uppercase">Datos del Vecino (Copia 1)</h3>
                    <input type="text" id="input-nombre-1" oninput="handleInput('nombre', this.value)" placeholder="Nombre Completo" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs">
                    <input type="text" id="input-rut-1" oninput="handleInput('rut', this.value)" placeholder="RUT" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs">
                    <textarea id="input-direccion-1" oninput="handleInput('direccion', this.value)" placeholder="Dirección" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- PREVISUALIZADOR -->
    <div id="preview-container" class="flex-1">
        <div id="a4-sheet" class="a4-sheet">
            <div class="cut-line"></div>
            <!-- C1 -->
            <div class="half-sheet" id="sheet-copia-1">
                <div class="text-center my-1.5"><h2 class="font-cert-title italic font-bold tracking-wider">CERTIFICADO DE RESIDENCIA</h2></div>
                <div class="font-cert-body text-justify">
                    <span class="font-bold">Señor(a) </span><span class="address-text-flow" id="preview-nombre-1"></span>
                    <span class="font-bold">, R.U.T: </span><span class="address-text-flow" id="preview-rut-1"></span>
                    <span class="font-bold">, con domicilio en </span><span class="address-text-flow" id="preview-direccion-1"></span>
                </div>
            </div>
            <!-- C2 -->
            <div class="half-sheet" id="sheet-copia-2">
                <div class="text-center my-1.5"><h2 class="font-cert-title italic font-bold tracking-wider">CERTIFICADO DE RESIDENCIA</h2></div>
                <div class="font-cert-body text-justify">
                    <span class="font-bold">Señor(a) </span><span class="address-text-flow" id="preview-nombre-2"></span>
                    <span class="font-bold">, R.U.T: </span><span class="address-text-flow" id="preview-rut-2"></span>
                    <span class="font-bold">, con domicilio en </span><span class="address-text-flow" id="preview-direccion-2"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Estado
        let state = {
            sync: true,
            c1: { nombre: '', rut: '', direccion: '' },
            c2: { nombre: '', rut: '', direccion: '' }
        };

        function toggleSync() { state.sync = document.getElementById('sync-checkbox').checked; }

        function handleInput(key, value) {
            state.c1[key] = value;
            if (state.sync) {
                state.c2[key] = value;
                const inputC2 = document.getElementById(`input-${key}-2`);
                if(inputC2) inputC2.value = value;
            }
            render();
        }

        function actualizarEstiloFuente() {
            const font = document.getElementById('select-label-font').value;
            const size = document.getElementById('input-font-size').value;
            document.getElementById('font-size-value').textContent = size;
            
            const style = document.getElementById('dynamic-style-injector');
            style.textContent = `
                :root {
                    --label-font: ${font};
                    --body-font: ${font};
                    --font-scale: ${size / 100};
                }
            `;
        }

        function render() {
            // Actualizar C1
            document.getElementById('preview-nombre-1').textContent = state.c1.nombre || "....................";
            document.getElementById('preview-rut-1').textContent = state.c1.rut || "....................";
            document.getElementById('preview-direccion-1').textContent = state.c1.direccion || "....................";
            
            // Actualizar C2
            document.getElementById('preview-nombre-2').textContent = state.c2.nombre || "....................";
            document.getElementById('preview-rut-2').textContent = state.c2.rut || "....................";
            document.getElementById('preview-direccion-2').textContent = state.c2.direccion || "....................";
        }

        window.onload = () => { actualizarEstiloFuente(); render(); };
    </script>
</body>
</html>
